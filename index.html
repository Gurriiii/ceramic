<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <title>Student Registration | Ceramic Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dark: #9a7a30;
      --dark: #0d1117;
      --dark2: #141b26;
      --text: #e8dfc8;
      --text-muted: #8a9ab0;
      --red: #e05c5c;
      --green: #4caf82;
      --border: rgba(201,168,76,0.2);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { background:#0d1117 !important; min-height: 100vh; }
    body { font-family:'DM Sans',sans-serif; color:var(--text); overflow-x:hidden; }

    #enrollmentPage { display: block; position: relative; z-index: 1; }
    #successPage { display: none; position: relative; z-index: 1; }

    /* BACKGROUND */
    .bg-canvas { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
    .bg-orb { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.15; animation:drift 12s ease-in-out infinite alternate; }
    .bg-orb:nth-child(1){width:600px;height:600px;background:#c9a84c;top:-200px;left:-200px;}
    .bg-orb:nth-child(2){width:400px;height:400px;background:#2a4a7a;bottom:-100px;right:-100px;animation-delay:4s;}
    @keyframes drift{from{transform:translate(0,0);}to{transform:translate(30px,40px);}}

    /* HEADER */
    header { position:relative; display:flex; align-items:center; justify-content:space-between; padding:18px 40px; background:rgba(13,17,23,0.85); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
    .logo-text { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--gold); }
    .logo-text span { color:var(--text); font-weight:300; }
    .header-badge { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:var(--dark); font-size:0.75rem; font-weight:600; padding:6px 14px; border-radius:20px; text-transform:uppercase; }

    /* HERO */
    .hero { text-align:center; padding:60px 20px 40px; }
    .hero-tag { display:inline-block; background:rgba(201,168,76,0.12); border:1px solid var(--border); color:var(--gold); font-size:0.78rem; font-weight:600; padding:8px 20px; border-radius:30px; margin-bottom:20px; }
    .hero h1 { font-family:'Playfair Display',serif; font-size:clamp(2.2rem, 6vw, 3.8rem); font-weight:900; line-height:1.1; color:#fff; margin-bottom: 15px; }
    .hero h1 em { font-style:normal; background:linear-gradient(90deg, var(--gold-light), var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hero p { color:var(--text-muted); font-size:1.05rem; max-width:500px; margin:0 auto; }

    /* FORM CARD */
    .form-container { max-width:720px; margin:0 auto 60px; padding:0 20px; }
    .form-card { background:rgba(20,27,38,0.9); border:1px solid var(--border); border-radius:24px; padding:40px; backdrop-filter:blur(20px); box-shadow:0 30px 80px rgba(0,0,0,0.5); }
    .form-card h2 { font-family:'Playfair Display',serif; font-size:1.6rem; color:#fff; margin-bottom:25px; }

    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    @media(max-width:560px){.field-row{grid-template-columns:1fr;}}
    .field-group { margin-bottom:22px; }
    .field-group label { display:block; font-size:0.82rem; font-weight:600; color:var(--gold); text-transform:uppercase; margin-bottom:8px; }
    .field-group input, .field-group select { width:100%; background:rgba(255,255,255,0.04); border:1.5px solid var(--border); border-radius:12px; color:var(--text); padding:13px 16px; outline:none; transition:0.3s; }
    .field-group input:focus { border-color:var(--gold); background:rgba(201,168,76,0.06); }

    /* DISTRICT SEARCH */
    .dist-wrapper { position:relative; }
    .select-display { width:100%; background:rgba(255,255,255,0.04); border:1.5px solid var(--border); border-radius:12px; padding:13px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
    .dist-search-box { display:none; position:absolute; top:105%; left:0; right:0; background:var(--dark2); border:1.5px solid var(--gold); border-radius:12px; z-index:100; max-height:200px; flex-direction:column; }
    .dist-search-box.open { display:flex; }
    .dist-search-input-wrap { padding:10px; border-bottom:1px solid var(--border); }
    .dist-search-input-wrap input { background:none; border:none; color:#fff; width:100%; outline:none; }
    .dist-list { overflow-y:auto; flex:1; }
    .dist-item { padding:10px 16px; cursor:pointer; font-size:0.9rem; }
    .dist-item:hover { background:rgba(201,168,76,0.15); color:var(--gold); }

    /* UPLOAD ZONE */
    .upload-zone { border:2px dashed var(--border); border-radius:14px; padding:25px; text-align:center; background:rgba(255,255,255,0.02); }
    .upload-actions { display:flex; gap:10px; justify-content:center; margin-top:12px; }
    .upload-btn { position:relative; background:rgba(201,168,76,0.1); border:1px solid var(--border); color:var(--gold); border-radius:10px; padding:8px 15px; font-size:0.8rem; cursor:pointer; }
    .upload-btn input { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .file-preview { display:none; margin-top:12px; background:rgba(201,168,76,0.08); padding:10px; border-radius:10px; align-items:center; justify-content:space-between; }

    /* SUBMIT */
    .submit-btn { width:100%; background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:var(--dark); border:none; border-radius:14px; font-size:1rem; font-weight:700; padding:16px; cursor:pointer; transition:0.3s; }
    .submit-btn:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(201,168,76,0.3); }

    footer { text-align:center; padding:30px; color:var(--text-muted); font-size:0.8rem; border-top:1px solid var(--border); margin-top:40px; }

    /* INVALID STATES */
    .invalid { border-color: var(--red) !important; background: rgba(224, 92, 92, 0.05) !important; }
  </style>
</head>
<body>

<div class="bg-canvas"><div class="bg-orb"></div><div class="bg-orb"></div></div>

<div id="enrollmentPage">
  <header>
    <div class="logo-text">Ceramic <span>Academy</span></div>
    <div class="header-badge">Enrolment Portal</div>
  </header>

  <section class="hero">
    <div class="hero-tag">✦ Enroll Yourself In</div>
    <h1>Ceramic<br/><em>Siksha Setu</em></h1>
    <p>Fill in all details and upload your 12th Board Marksheet to proceed.</p>
  </section>

  <div class="form-container">
    <div class="form-card">
      <h2>Registration Form</h2>
      <form id="regForm" novalidate>
        <div class="field-row">
          <div class="field-group">
            <label>Full Name *</label>
            <input type="text" id="name" data-name="Full Name" placeholder="Enter Full Name" required />
          </div>
          <div class="field-group">
            <label>Father's Name *</label>
            <input type="text" id="fatherName" data-name="Father's Name" placeholder="Father's Name" required />
          </div>
        </div>

        <div class="field-group">
          <label>Mobile Number *</label>
          <input type="tel" id="mobile" data-name="Mobile Number" placeholder="10-digit number" maxlength="10" required />
        </div>

        <div class="field-group">
          <label>District *</label>
          <div class="dist-wrapper" id="distWrapper">
            <div class="select-display" id="distDisplay">
              <span id="distDisplayText">Select District</span>
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <input type="hidden" id="distValue" required />
            <div class="dist-search-box" id="distBox">
              <div class="dist-search-input-wrap"><input type="text" id="distSearch" placeholder="Search..." autocomplete="off" /></div>
              <div class="dist-list" id="distList"></div>
            </div>
          </div>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label>12th Year *</label>
            <select id="passingYear" data-name="Passing Year" required>
              <option value="" disabled selected>Year</option>
              <option value="2024">2024</option>
              <option value="2025">2025</option>
              <option value="2026">2026</option>
            </select>
          </div>
          <div class="field-group">
            <label>Board *</label>
            <select id="board" data-name="Board" required>
              <option value="" disabled selected>Board</option>
              <option value="CBSE">CBSE</option>
              <option value="RBSE">RBSE</option>
            </select>
          </div>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label>School Name *</label>
            <input type="text" id="school" data-name="School Name" placeholder="School Name" required />
          </div>
          <div class="field-group">
            <label>12th % *</label>
            <input type="text" id="percentage" data-name="Percentage" placeholder="Percentage" required />
          </div>
        </div>

        <div class="field-group">
          <label>12th Marksheet *</label>
          <div class="upload-zone" id="uploadZone">
            <p style="font-size: 0.9rem; color: var(--text-muted);">Choose or Drop File</p>
            <div class="upload-actions">
              <label class="upload-btn">Choose File<input type="file" id="admitCard" accept=".pdf,image/*" /></label>
              <label class="upload-btn">Take Photo<input type="file" id="admitCamera" accept="image/*" capture="environment" /></label>
            </div>
          </div>
          <div class="file-preview" id="filePreview">
            <span id="fileName" style="font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis;"></span>
            <button type="button" id="fileRemove" style="background:none;border:none;color:var(--red);cursor:pointer;">✕</button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Submit Registration</button>
      </form>
    </div>
  </div>
  <footer>© 2026 Ceramic Academy | ceramicacademy.in</footer>
</div>

<script>
const districts = ["Ajmer","Alwar","Banswara","Baran","Barmer","Bharatpur","Bhilwara","Bikaner","Bundi","Chittorgarh","Churu","Dausa","Dholpur","Dungarpur","Hanumangarh","Jaipur","Jaisalmer","Jalore","Jhalawar","Jhunjhunu","Jodhpur","Karauli","Kota","Nagaur","Pali","Pratapgarh","Rajsamand","Sawai Madhopur","Sikar","Sirohi","Sri Ganganagar","Tonk","Udaipur"].sort();

const distDisplay = document.getElementById('distDisplay');
const distBox = document.getElementById('distBox');
const distSearch = document.getElementById('distSearch');
const distList = document.getElementById('distList');
const distValue = document.getElementById('distValue');

function renderDistricts(q='') {
  const f = q.toLowerCase();
  distList.innerHTML = districts.filter(d => d.toLowerCase().includes(f))
    .map(d => `<div class="dist-item" onclick="selectDistrict('${d}')">${d}</div>`).join('') || '<div class="dist-item">No results</div>';
}

window.selectDistrict = (d) => {
  distValue.value = d;
  document.getElementById('distDisplayText').textContent = d;
  distBox.classList.remove('open');
};

distDisplay.addEventListener('click', (e) => {
  e.stopPropagation();
  distBox.classList.toggle('open');
});

distSearch.addEventListener('input', e => renderDistricts(e.target.value));
document.addEventListener('click', () => distBox.classList.remove('open'));
renderDistricts();

// File Handling
let selectedFile = null;
const applyFile = (file) => {
  selectedFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('filePreview').style.display = 'flex';
};

document.getElementById('admitCard').addEventListener('change', e => e.target.files[0] && applyFile(e.target.files[0]));
document.getElementById('admitCamera').addEventListener('change', e => e.target.files[0] && applyFile(e.target.files[0]));
document.getElementById('fileRemove').addEventListener('click', () => { selectedFile = null; document.getElementById('filePreview').style.display = 'none'; });

// Form Submit (Basic Validation)
document.getElementById('regForm').addEventListener('submit', (e) => {
  e.preventDefault();
  let valid = true;
  document.querySelectorAll('input[required], select[required]').forEach(el => {
    if(!el.value) { el.classList.add('invalid'); valid = false; }
    else { el.classList.remove('invalid'); }
  });
  if(valid) alert("Submitted successfully!");
});
</script>
</body>
</html>
